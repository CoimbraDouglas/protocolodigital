databases:
  - name: protocolodigital-db
    plan: free

services:
  - type: web
    name: protocolodigital
    runtime: node
    plan: free
    buildCommand: bash render-build.sh
    startCommand: cd backend && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: protocolodigital-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
      # E-mail (notificações). Defina os valores no painel do Render.
      # Deixe em branco para desabilitar o envio.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_URL
        sync: false
